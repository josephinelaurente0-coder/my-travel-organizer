<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>My Travel Organizer</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="theme-color" content="#3E5C3F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="My Travel Organizer" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap');
  :root{
    --soil:#33261C; --soilSoft:#5C4A3A; --bark:#7A5A3E;
    --terraceDeep:#3E5C3F; --terraceMid:#6E8F5C; --terraceLight:#9CB57F;
    --gold:#C7962F; --goldSoft:#E4C77A; --clay:#B3612F;
    --mist:#F6F0E3; --paper:#FBF7EE; --fog:#EDE4CF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--mist);font-family:'Work Sans',sans-serif;color:var(--soil);}
  #shell{max-width:440px;margin:0 auto;min-height:100vh;position:relative;background:var(--mist);box-shadow:0 0 40px rgba(51,38,28,0.08);}
  h1,h2,h3,.serif{font-family:'Fraunces',serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .uc{text-transform:uppercase;letter-spacing:.5px;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:'Work Sans',sans-serif;font-size:14.5px;width:100%;box-sizing:border-box;border:1.5px solid var(--fog);background:var(--paper);border-radius:10px;padding:10px 12px;color:var(--soil);outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--gold);}
  .field{display:block;margin-bottom:12px;}
  .field .lbl{font-size:11.5px;font-weight:600;letter-spacing:.4px;color:var(--soilSoft);text-transform:uppercase;display:block;margin-bottom:5px;}
  .row2{display:flex;gap:10px;}
  .row2>div{flex:1;}
  .btn-primary{width:100%;background:var(--terraceDeep);color:var(--mist);border:none;border-radius:10px;padding:12px 16px;font-weight:600;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-primary:disabled{background:var(--bark);opacity:.6;cursor:not-allowed;}
  .card{background:var(--paper);border:1px solid var(--fog);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 2px rgba(51,38,28,.05);}
  .icon{display:inline-flex;vertical-align:middle;}
  .meta-row{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:12.5px;color:var(--soilSoft);}
  .cost-pill{display:inline-block;margin-top:8px;background:var(--fog);border-radius:8px;padding:3px 9px;font-size:12px;color:var(--clay);font-weight:500;}
  .empty{text-align:center;padding:40px 20px;color:var(--soilSoft);}
  .empty .circ{width:56px;height:56px;border-radius:50%;background:var(--fog);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
  .empty .t{font-family:'Fraunces',serif;font-weight:600;font-size:16px;color:var(--soil);margin-bottom:4px;}
  .empty .s{font-size:13px;line-height:1.5;}
  .action-col{display:flex;flex-direction:column;gap:6px;align-items:center;flex-shrink:0;}
  .del-btn,.edit-btn{background:transparent;border:none;padding:6px;display:flex;border-radius:8px;}
  .del-btn{color:var(--clay);}
  .edit-btn{color:var(--terraceDeep);}
  .del-btn:active,.edit-btn:active{background:var(--fog);}
  .tabhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .tabhead-left{display:flex;align-items:center;gap:10px;}
  .tabhead-icon{width:36px;height:36px;border-radius:10px;background:var(--terraceDeep);display:flex;align-items:center;justify-content:center;}
  .tabhead-title{font-family:'Fraunces',serif;font-weight:700;font-size:21px;color:var(--soil);line-height:1.1;}
  .tabhead-add{background:var(--gold);border:none;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;}
  .tabsub{font-size:13px;color:var(--soilSoft);margin-bottom:16px;}
  .tabpad{padding:18px 16px 100px;}
  #sheetOverlay{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;justify-content:center;}
  #sheetOverlay.open{display:flex;}
  #sheetBg{position:absolute;inset:0;background:rgba(51,38,28,.45);}
  #sheetBody{position:relative;width:100%;max-width:440px;max-height:88%;overflow-y:auto;background:var(--mist);border-radius:20px 20px 0 0;padding:18px 18px 22px;animation:slideUp .22s ease-out;}
  @keyframes slideUp{from{transform:translateY(24px);opacity:.6;}to{transform:translateY(0);opacity:1;}}
  #sheetHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  #sheetTitle{font-family:'Fraunces',serif;font-weight:700;font-size:19px;}
  #sheetClose{background:var(--fog);border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;}
  #bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:var(--paper);border-top:1px solid var(--fog);display:flex;padding:8px 4px calc(env(safe-area-inset-bottom,0px) + 8px);z-index:20;}
  .navbtn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;color:var(--bark);}
  .navbtn.active{color:var(--terraceDeep);}
  .navbtn span{font-size:10px;font-weight:500;}
  .navbtn.active span{font-weight:700;}
  #header{position:sticky;top:0;z-index:10;background:var(--mist);}
  #headerRow{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;}
  .terrace-divider{display:flex;width:100%;height:6px;}
  .terrace-divider>div{flex:1;}
  ::-webkit-scrollbar{width:0;height:0;}
  .chip{flex-shrink:0;border:1.4px solid var(--fog);background:var(--paper);color:var(--soilSoft);border-radius:20px;padding:6px 14px;font-size:12.5px;font-weight:600;white-space:nowrap;}
  .chip.active{border-color:var(--terraceDeep);background:var(--terraceDeep);color:var(--mist);}
  #offlineBadge{position:fixed;top:8px;left:50%;transform:translateX(-50%);background:var(--soil);color:var(--mist);font-size:11.5px;font-weight:600;padding:5px 12px;border-radius:20px;z-index:60;display:none;box-shadow:0 2px 8px rgba(0,0,0,.2);}
  #offlineBadge.show{display:block;}
</style>
</head>
<body>
<div id="offlineBadge">You're offline — your data is safe on this device</div>
<div id="shell">
  <div id="header">
    <div id="headerRow">
      <div id="logoSlot40"></div>
      <div>
        <div class="serif" style="font-weight:800;font-size:17px;line-height:1.1;">My Travel Organizer</div>
        <div style="font-size:11px;color:var(--soilSoft);letter-spacing:.3px;">Jony JJ Edition</div>
      </div>
    </div>
    <div class="terrace-divider">
      <div style="background:var(--terraceDeep)"></div><div style="background:var(--terraceMid)"></div><div style="background:var(--terraceLight)"></div><div style="background:var(--gold)"></div>
    </div>
  </div>

  <div id="content"></div>

  <div id="bottomnav"></div>
</div>

<div id="sheetOverlay">
  <div id="sheetBg"></div>
  <div id="sheetBody">
    <div id="sheetHead">
      <span id="sheetTitle"></span>
      <button id="sheetClose"></button>
    </div>
    <div id="sheetContent"></div>
  </div>
</div>

document.getElementById('logoSlot40').innerHTML = logoSVG(40);

/* ---------------- STATE ---------------- */
const DEFAULT_RATES = { USD:1, PHP:58.5, EUR:0.92, GBP:0.79, JPY:157, KRW:1380, AUD:1.52, SGD:1.34, CNY:7.25 };
let STATE = {
  tab: 'overview',
  loaded: false,
  flights: [], stays: [], tours: [], budget: [], notes: [], contacts: [], savedTrips: [],
  documents: [], journal: [], currency: { rates: DEFAULT_RATES, updated: null }, remindersShown: [],
  noteFilter: 'All',
};
let draft = {};

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const peso = (n) => '$' + (Number(n)||0).toLocaleString('en-US',{maximumFractionDigits:0});
const fmtDate = (d) => { if(!d) return null; const dt=new Date(d+'T00:00:00'); if(isNaN(dt)) return d; return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
const fmtShort = (d) => { if(!d) return null; const dt=new Date(d+'T00:00:00'); if(isNaN(dt)) return d; return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}); };
const esc = (s) => String(s==null?'':s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

/* ---------------- STORAGE (guarded, works offline via local cache) ---------------- */
const hasStorage = typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function' && typeof window.storage.set === 'function';
const LS_PREFIX = 'mto_local_'; // localStorage fallback so the app works fully offline / standalone

async function loadAll(){
  const keys = ['flights','stays','tours','budget','notes','contacts','savedTrips','documents','journal','currency','remindersShown'];
  // 1) try local cache first (instant, works offline)
  keys.forEach(k=>{
    try{
      const raw = localStorage.getItem(LS_PREFIX+k);
      if(raw) STATE[k] = JSON.parse(raw);
    }catch(e){}
  });
  // 2) then sync with remote storage if available (non-blocking for offline use)
  if(hasStorage){
    try{
      await Promise.all(keys.map(async k => {
        try{
          const res = await window.storage.get('mto:'+k);
          if(res && res.value) STATE[k] = JSON.parse(res.value);
        }catch(e){}
      }));
    }catch(e){}
  }
  // 3) migrate legacy entries that predate the departure/arrival & start/end date fields
  //    (older saved flights/tours used a single "date" field) so edits & Overview work correctly
  let migrated = false;
  STATE.flights = STATE.flights.map(f=>{
    if(!f.departDate && f.date){ migrated = true; return {...f, departDate: f.date, departTime: f.departTime || f.time || ''}; }
    return f;
  });
  STATE.tours = STATE.tours.map(t=>{
    if(!t.startDate && t.date){ migrated = true; return {...t, startDate: t.date}; }
    return t;
  });
  if(migrated){ persist('flights'); persist('tours'); }

  STATE.loaded = true;
  renderAll();
  checkReminders();
}
function persist(key){
  try{ localStorage.setItem(LS_PREFIX+key, JSON.stringify(STATE[key])); }catch(e){}
  if(hasStorage){
    try{ window.storage.set('mto:'+key, JSON.stringify(STATE[key])).catch(()=>{}); }catch(e){}
  }
}

/* ---------------- OFFLINE INDICATOR ---------------- */
function updateOfflineBadge(){
  const badge = document.getElementById('offlineBadge');
  if(navigator.onLine === false) badge.classList.add('show');
  else badge.classList.remove('show');
}
window.addEventListener('online', updateOfflineBadge);
window.addEventListener('offline', updateOfflineBadge);

/* ---------------- SERVICE WORKER (offline app shell) ---------------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./service-worker.js').catch(()=>{ /* preview sandboxes may block this; app still works via localStorage */ });
  });

/* ==================================================
   PDF EXPORT — hand-built PDF writer, zero dependencies
   (so trip records survive even if the person later
   edits or deletes the underlying flight/stay/tour entries)
================================================== */
function sanitizeForPDF(s){
  if(s==null) return '';
  return String(s)
    .replace(/₱/g, '$')
    .replace(/→/g, '-')
    .replace(/•/g, '-')
    .replace(/[’‘]/g, "'")
    .replace(/[“”]/g, '"')
    .replace(/[^\x00-\xFF]/g, '?');
}
function bytesToBase64(bytes){
  let binary = '';
  const chunk = 0x8000;
  for(let i=0;i<bytes.length;i+=chunk){
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i+chunk));
  }
  return btoa(binary);
}
function base64ToBytes(b64){
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}
function strToBytes(str){
  const bytes = new Uint8Array(str.length);
  for(let i=0;i<str.length;i++) bytes[i] = str.charCodeAt(i) & 0xFF;
  return bytes;
}

function buildPDFBytes(title, sections){
  const pdfEsc = (s) => sanitizeForPDF(s).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)');
  const pageW=612, pageH=792, marginX=50;
  const HEADER_H=58, FOOTER_H=30;
  const sizeHead=11.5, sizeBody=9.8;
  const lhBody=13.5, lhHead=21, gapAfterSection=24;
  const top = pageH-HEADER_H-16, bottom = FOOTER_H+22;
  const maxCharsBody = Math.floor((pageW-marginX*2)/(sizeBody*0.52));
  const maxCharsHead = Math.floor((pageW-marginX*2-14)/(sizeHead*0.58));

  // Banaue palette as PDF RGB (0-1) triples
  const C = {
    terraceDeep: '0.243 0.361 0.247',
    gold:        '0.78 0.588 0.184',
    clay:        '0.702 0.38 0.184',
    soil:        '0.2 0.149 0.11',
    soilSoft:    '0.361 0.29 0.227',
    fog:         '0.929 0.898 0.812',
    white:       '1 1 1',
  };
  const genDate = fmtDate(new Date().toISOString().slice(0,10));
  const textWidthApprox = (t, size) => t.length * size * 0.5;

  function wrap(text, maxChars){
    text = sanitizeForPDF(text);
    if(text.length<=maxChars) return [text];
    const words = text.split(' ');
    let lines=[], cur='';
    words.forEach(w=>{
      const test = cur ? cur+' '+w : w;
      if(test.length>maxChars){ if(cur) lines.push(cur); cur=w; } else cur=test;
    });
    if(cur) lines.push(cur);
    return lines;
  }

  let blocks=[];
  sections.forEach(sec=>{
    if(!sec.lines || !sec.lines.length) return;
    wrap(sec.heading, maxCharsHead).forEach(w=> blocks.push({t:'head', text:w}));
    sec.lines.forEach(l=>{ wrap(l, maxCharsBody).forEach(w=> blocks.push({t:'body', text:w})); });
    blocks.push({t:'gap'});
  });

  let pages=[], cur=[], y=top;
  function hgt(b){ if(b.t==='head') return lhHead; if(b.t==='gap') return gapAfterSection; return lhBody; }
  blocks.forEach(b=>{
    const height = hgt(b);
    if(y-height<bottom){ pages.push(cur); cur=[]; y=top; }
    if(b.t==='gap'){
      cur.push({type:'rule', y: y - 7});
    } else {
      cur.push({
        type:'text', text:b.text,
        size: b.t==='head' ? sizeHead : sizeBody,
        bold: b.t==='head',
        color: b.t==='head' ? C.terraceDeep : C.soil,
        accent: b.t==='head',
        y
      });
    }
    y -= height;
  });
  if(cur.length) pages.push(cur);
  if(pages.length===0) pages.push([]);

  const numPages = pages.length;
  const totalObjs = 4 + 2*numPages;
  const objs = new Array(totalObjs);
  objs[0] = `1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n`;
  const kids = []; for(let i=0;i<numPages;i++) kids.push(`${5+i} 0 R`);
  objs[1] = `2 0 obj\n<< /Type /Pages /Kids [${kids.join(' ')}] /Count ${numPages} >>\nendobj\n`;
  objs[2] = `3 0 obj\n<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>\nendobj\n`;
  objs[3] = `4 0 obj\n<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>\nendobj\n`;
  for(let i=0;i<numPages;i++){
    const pageObjNum = 5+i, contentObjNum = 5+numPages+i;
    objs[pageObjNum-1] = `${pageObjNum} 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageW} ${pageH}] /Resources << /Font << /F1 3 0 R /F2 4 0 R >> >> /Contents ${contentObjNum} 0 R >>\nendobj\n`;
  }
  for(let i=0;i<numPages;i++){
    const contentObjNum = 5+numPages+i;
    let rects = '';
    // header band + gold underline
    rects += `${C.terraceDeep} rg\n0 ${pageH-HEADER_H} ${pageW} ${HEADER_H} re\nf\n`;
    rects += `${C.gold} rg\n0 ${pageH-HEADER_H-2} ${pageW} 2 re\nf\n`;
    // footer rule
    rects += `${C.fog} rg\n${marginX} ${FOOTER_H} ${pageW-2*marginX} 1 re\nf\n`;
    // per-item accent tabs + section-divider rules
    pages[i].forEach(item=>{
      if(item.type==='rule'){
        rects += `${C.fog} rg\n${marginX} ${item.y.toFixed(2)} ${(pageW-2*marginX)} 0.75 re\nf\n`;
      } else if(item.type==='text' && item.accent){
        rects += `${C.gold} rg\n${(marginX-9).toFixed(2)} ${(item.y-3).toFixed(2)} 3 ${(item.size+5).toFixed(2)} re\nf\n`;
      }
    });

    let txt = 'BT\n';
    // header text: title (left), page label (right), branding subtitle
    const pgLabel = `Page ${i+1} of ${numPages}`;
    const pgLabelW = textWidthApprox(pgLabel, 8);
    const maxTitleW = pageW - marginX*2 - pgLabelW - 16;
    let headerTitle = sanitizeForPDF(title);
    while(textWidthApprox(headerTitle, 13.5) > maxTitleW && headerTitle.length > 4){
      headerTitle = headerTitle.slice(0, -4) + '...';
    }
    txt += `${C.white} rg\n/F1 13.5 Tf\n1 0 0 1 ${marginX} ${pageH-23} Tm\n(${pdfEsc(headerTitle)}) Tj\n`;
    txt += `${C.white} rg\n/F2 8 Tf\n1 0 0 1 ${(pageW-marginX-pgLabelW).toFixed(2)} ${pageH-23} Tm\n(${pdfEsc(pgLabel)}) Tj\n`;
    txt += `${C.gold} rg\n/F2 8 Tf\n1 0 0 1 ${marginX} ${pageH-37} Tm\n(MY TRAVEL ORGANIZER  -  JONY JJ EDITION) Tj\n`;
    // body
    pages[i].forEach(item=>{
      if(item.type!=='text') return;
      const font = item.bold ? '/F1' : '/F2';
      txt += `${item.color} rg\n${font} ${item.size} Tf\n1 0 0 1 ${marginX} ${item.y.toFixed(2)} Tm\n(${pdfEsc(item.text)}) Tj\n`;
    });
    // footer
    const footerLabel = `Generated ${genDate}  -  My Travel Organizer  -  Jony JJ Edition`;
    txt += `${C.soilSoft} rg\n/F2 7.5 Tf\n1 0 0 1 ${marginX} ${FOOTER_H-14} Tm\n(${pdfEsc(footerLabel)}) Tj\n`;
    txt += 'ET';

    const stream = rects + txt;
    objs[contentObjNum-1] = `${contentObjNum} 0 obj\n<< /Length ${stream.length} >>\nstream\n${stream}\nendstream\nendobj\n`;
  }

  let pdf = '%PDF-1.4\n';
  const offsets=[0];
  for(let i=0;i<totalObjs;i++){ offsets.push(pdf.length); pdf += objs[i]; }
  const xrefStart = pdf.length;
  pdf += `xref\n0 ${totalObjs+1}\n0000000000 65535 f \n`;
  for(let i=1;i<=totalObjs;i++) pdf += String(offsets[i]).padStart(10,'0') + ' 00000 n \n';
  pdf += `trailer\n<< /Size ${totalObjs+1} /Root 1 0 R >>\nstartxref\n${xrefStart}\n%%EOF`;
  return pdf;
}

function buildTripPDFSections(){
  const auto = computeAutoTotals();
  const manualTotal = STATE.budget.reduce((s,b)=>s+(Number(b.amount)||0),0);
  const grand = manualTotal + auto.flights + auto.stays + auto.tours;
  const php = (n) => '$' + (Number(n)||0).toLocaleString('en-US',{maximumFractionDigits:0});
  const sections = [];

  const events = [];
  STATE.flights.forEach(f=> f.departDate && events.push({date:f.departDate, text:`Flight: ${f.from||'?'} to ${f.to||'?'} - ${[f.airline,f.flightNo].filter(Boolean).join(' ')}`}));
  STATE.stays.forEach(s=> s.checkIn && events.push({date:s.checkIn, text:`Stay: ${s.name}${s.location?' - '+s.location:''} (check-in ${fmtDate(s.checkIn)}${s.checkOut?' to '+fmtDate(s.checkOut):''})`}));
  STATE.tours.forEach(t=> t.startDate && events.push({date:t.startDate, text:`Tour: ${t.name}${t.provider?' - '+t.provider:''} (${fmtDate(t.startDate)}${t.endDate&&t.endDate!==t.startDate?' to '+fmtDate(t.endDate):''})`}));
  events.sort((a,b)=>a.date.localeCompare(b.date));
  sections.push({heading:'Trip Sequence', lines: events.length ? events.map(e=>`${fmtDate(e.date)} - ${e.text}`) : ['No dated items yet.']});

  sections.push({heading:'Flights', lines: STATE.flights.length ? STATE.flights.map(f=>
    `${[f.airline,f.flightNo].filter(Boolean).join(' ')||'Flight'} | ${f.from||'?'} to ${f.to||'?'} | Depart ${fmtDate(f.departDate)}${f.departTime?' '+f.departTime:''}${f.arriveDate?' | Arrive '+fmtDate(f.arriveDate)+(f.arriveTime?' '+f.arriveTime:''):''}${f.conf?' | Conf: '+f.conf:''}${f.cost?' | '+php(f.cost):''}`
  ) : ['No flights added.']});

  sections.push({heading:'Accommodation', lines: STATE.stays.length ? STATE.stays.map(s=>
    `${s.name}${s.location?' - '+s.location:''} | ${fmtDate(s.checkIn)} to ${fmtDate(s.checkOut)}${s.conf?' | Conf: '+s.conf:''}${s.cost?' | '+php(s.cost):''}`
  ) : ['No accommodation added.']});

  sections.push({heading:'Booked Tour Packages', lines: STATE.tours.length ? STATE.tours.map(t=>
    `${t.name}${t.provider?' - '+t.provider:''} | ${fmtDate(t.startDate)}${t.endDate&&t.endDate!==t.startDate?' to '+fmtDate(t.endDate):''}${t.time?' | '+t.time:''}${t.meet?' | Meet: '+t.meet:''}${t.conf?' | Conf: '+t.conf:''}${t.cost?' | '+php(t.cost):''}`
  ) : ['No tours booked.']});

  let budgetLines = [
    `Total trip cost: ${php(grand)}`,
    `Flights ${php(auto.flights)}  |  Stays ${php(auto.stays)}  |  Tours ${php(auto.tours)}  |  Extras ${php(manualTotal)}`,
  ];
  if(STATE.budget.length){
    budgetLines.push('Extra expenses:');
    STATE.budget.forEach(b=> budgetLines.push(`- ${b.description||b.category} (${b.category}) - ${php(b.amount)}${b.date?' - '+fmtDate(b.date):''}`));
  }
  sections.push({heading:'Budget Summary', lines: budgetLines});

  sections.push({heading:'Notes', lines: STATE.notes.length ? STATE.notes.map(n=>
    `[${n.category}] ${n.text}${n.category==='Packing List' ? (n.done?' (packed)':' (not packed)') : ''}`
  ) : ['No notes added.']});

  sections.push({heading:'Travel Documents', lines: STATE.documents.length ? STATE.documents.map(d=>
    `${d.label} (${d.type})${d.holder?' - '+d.holder:''}${d.docNumber?' - No. '+d.docNumber:''}${d.expiryDate?' - Expires '+fmtDate(d.expiryDate):''}`
  ) : ['No documents added.']});

  sections.push({heading:'Travel Journal', lines: STATE.journal.length ? STATE.journal.map(j=>
    `${fmtDate(j.date)}${j.title?' - '+j.title:''}: ${j.text}`
  ) : ['No journal entries yet.']});

  sections.push({heading:'Emergency Contacts', lines: STATE.contacts.length ? STATE.contacts.map(c=>
    `${c.name}${c.relation?' ('+c.relation+')':''} - ${c.phone}${c.altPhone?' / '+c.altPhone:''}${c.notes?' - '+c.notes:''}`
  ) : ['No emergency contacts added.']});

  return sections;
}

function downloadPDFBytes(bytes, filename){
  const blob = new Blob([bytes], {type:'application/pdf'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}
function safeFileName(name){
  return (name||'trip').replace(/[^a-z0-9\- ]/gi,'').trim().replace(/\s+/g,' ') || 'trip';
}

function openSavePdfSheet(){
  draft = { name: `My Trip - ${fmtDate(new Date().toISOString().slice(0,10))}` };
  const canSave = ()=> draft.name && draft.name.trim();
  const html = fieldHTML('Name this trip', inputHTML('name','text','e.g. Banaue Family Trip 2026', draft.name))
    + `<div style="font-size:12px;color:var(--soilSoft);margin:-4px 0 14px;line-height:1.5;">This saves a full copy of your flights, stays, tours, budget, notes and emergency contacts as a PDF, kept in the Saved Trips folder under Notes — safe even if you edit or delete details later.</div>`;
  openSheet('Save trip as PDF', html, ()=>{
    if(!draft.name || !draft.name.trim()) return;
    saveTripAsPDF(draft.name.trim());
    closeSheet();
  }, canSave, 'Save PDF');
}
function saveTripAsPDF(name){
  const sections = buildTripPDFSections();
  const pdfStr = buildPDFBytes(name, sections);
  const bytes = strToBytes(pdfStr);
  downloadPDFBytes(bytes, safeFileName(name) + '.pdf');
  const base64 = bytesToBase64(bytes);
  STATE.savedTrips.push({ id: uid(), name, date: new Date().toISOString().slice(0,10), pdfBase64: base64 });
  persist('savedTrips');
  renderAll();
}

function recomputeCurrency(){
  const amtEl = document.getElementById('curAmount');
  const fromEl = document.getElementById('curFrom');
  const toEl = document.getElementById('curTo');
  const resultEl = document.getElementById('curResult');
  if(!amtEl || !fromEl || !toEl || !resultEl) return;
  const amt = Number(amtEl.value) || 0;
  const rates = (STATE.currency && STATE.currency.rates) || DEFAULT_RATES;
  const from = fromEl.value, to = toEl.value;
  const usdAmt = amt / (rates[from] || 1);
  const result = usdAmt * (rates[to] || 1);
  resultEl.textContent = `${amt.toLocaleString()} ${from} = ${result.toLocaleString(undefined,{maximumFractionDigits:2})} ${to}`;
}
async function refreshRates(){
  if(typeof navigator !== 'undefined' && navigator.onLine === false) return;
  try{
    const res = await fetch('https://open.er-api.com/v6/latest/USD');
    if(!res.ok) return;
    const data = await res.json();
    if(data && data.rates){
      STATE.currency = { rates: data.rates, updated: new Date().toISOString().slice(0,10) };
      persist('currency');
      if(STATE.tab==='budget') renderAll();
    }
  }catch(e){ /* offline, blocked, or no CORS access — silently keep cached/fallback rates */ }
}

function expiryStatus(expiryDate){
  if(!expiryDate) return {level:'none', text:'', color:'inherit'};
  const days = Math.round((new Date(expiryDate+'T00:00:00') - new Date(new Date().toISOString().slice(0,10)+'T00:00:00'))/86400000);
  if(days<0) return {level:'expired', text:`Expired ${fmtDate(expiryDate)}`, color:'var(--clay)', days};
  if(days<=90) return {level:'soon', text:`Expires ${fmtDate(expiryDate)} · ${days} day${days===1?'':'s'} left`, color:'var(--clay)', days};
  return {level:'ok', text:`Valid until ${fmtDate(expiryDate)}`, color:'var(--soilSoft)', days};
}
function urgentDocument(){
  let worst = null;
  STATE.documents.forEach(d=>{
    if(!d.expiryDate) return;
    const s = expiryStatus(d.expiryDate);
    if(s.level==='expired' || s.level==='soon'){ if(!worst || s.days<worst.days) worst = {...d, days: s.days}; }
  });
  return worst;
}

function getReminderCandidates(){
  const list = [];
  STATE.flights.forEach(f=>{
    const d = f.departDate || f.date;
    if(!d) return;
    list.push({type:'flight', id:f.id, date:d, time:f.departTime||f.time||null, label:`Flight: ${f.from||'?'} to ${f.to||'?'}`, detail:f.airline||''});
  });
  STATE.tours.forEach(t=>{
    const d = t.startDate || t.date;
    if(!d) return;
    list.push({type:'tour', id:t.id, date:d, time:t.time||null, label:t.name||'Tour', detail:t.provider||''});
  });
  STATE.stays.forEach(s=>{
    if(!s.checkIn) return;
    list.push({type:'stay', id:s.id, date:s.checkIn, time:null, label:`Check-in: ${s.name||'Accommodation'}`, detail:s.location||''});

  return list;
}

function fireNotification(title, body){
  try{
    if(typeof Notification==='undefined' || Notification.permission!=='granted') return;
    if(navigator.serviceWorker && navigator.serviceWorker.getRegistration){
      navigator.serviceWorker.getRegistration().then(reg=>{
        if(reg && reg.showNotification) reg.showNotification(title, {body, icon:'icon-192.png', badge:'icon-192.png'});
        else new Notification(title, {body, icon:'icon-192.png'});
      }).catch(()=>{ try{ new Notification(title,{body, icon:'icon-192.png'}); }catch(e){} });
    } else {
      new Notification(title, {body, icon:'icon-192.png'});
    }
  }catch(e){ /* notifications blocked or unsupported on this device */ }
}
function upcomingReminders(windowHours){
  // returns candidates currently inside the given hour window (for the Overview banner, permission-independent)
  const now = new Date();
  return getReminderCandidates().map(item=>{
    const dt = reminderDateTime(item);
    if(!dt) return null;
    const hoursUntil = (dt - now) / 3600000;
    return {...item, dt, hoursUntil};
  }).filter(x=> x && x.hoursUntil > 0 && x.hoursUntil <= windowHours)
    .sort((a,b)=> a.hoursUntil - b.hoursUntil);
}
function checkReminders(){
  const now = new Date();
  const candidates = getReminderCandidates();
  let changed = false;
  candidates.forEach(item=>{
    const dt = reminderDateTime(item);
    if(!dt) return;
    const hoursUntil = (dt - now) / 3600000;
    const timeStr = item.time ? ` at ${item.time}` : '';
    const key1d = reminderKey(item.type,item.id,'1d');
    if(hoursUntil>0 && hoursUntil<=24 && !STATE.remindersShown.includes(key1d)){
      fireNotification(`Tomorrow: ${item.label}`, `${item.detail?item.detail+' - ':''}${fmtDate(item.date)}${timeStr}`);
      STATE.remindersShown.push(key1d); changed=true;
    }
    if(item.time){
      const key5h = reminderKey(item.type,item.id,'5h');
      if(hoursUntil>0 && hoursUntil<=5 && !STATE.remindersShown.includes(key5h)){
        fireNotification(`Starting soon: ${item.label}`, `${item.detail?item.detail+' - ':''}${fmtDate(item.date)}${timeStr} (about 5 hours away)`);
        STATE.remindersShown.push(key5h); changed=true;
      }
    }
  });
  if(changed) persist('remindersShown');
}

function renderReminderSettings(){
  const supported = typeof Notification !== 'undefined';
  const perm = supported ? Notification.permission : 'unsupported';
  let statusText;
  if(!supported) statusText = "Phone alerts aren't supported in this browser.";
  else if(perm==='granted') statusText = "Phone alerts are on. You'll be notified 1 day before, and 5 hours before when a time is set, for flights, tours, and check-ins — while the app is open or running in the background.";
  else if(perm==='denied') statusText = 'Phone alerts are blocked in your browser settings for this app. Enable notifications for this site to turn them back on.';
  else statusText = 'Turn on phone alerts to get reminded 1 day before, and 5 hours before when a time is set, for your flights, tours, and check-ins.';
  return `<div style="display:flex;align-items:center;justify-content:space-between;margin:2px 0 10px;">
    <div class="serif" style="font-weight:600;font-size:15px;display:flex;align-items:center;gap:6px;">${ICON.bell} Reminders</div>
  </div>
  <div class="card">
    <div style="font-size:12.5px;color:var(--soilSoft);line-height:1.5;${supported && perm!=='granted' ? 'margin-bottom:10px;':''}">${esc(statusText)}</div>
    ${supported && perm!=='granted' ? `<button class="btn-primary" data-enable-notifs>${ICON.bell} Enable phone alerts</button>` : ''}
  </div>`;
}

function renderNotes(){
  let html = tabHeadHTML('notes','Notes','Packing, tips & everything else','note');
  html += renderReminderSettings();
  html += renderEmergencyContacts();
  html += renderDocuments();
  html += renderJournal();
  html += renderSavedTrips();
  html += `<div class="serif" style="font-weight:600;font-size:15px;margin:20px 0 10px;">Other notes</div>`;
  html += `<div style="display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;">`;
  ['All',...NOTE_CATS].forEach(c=>{
    html += `<button class="chip ${STATE.noteFilter===c?'active':''}" data-notefilter="${esc(c)}">${esc(c)}</button>`;
  });
  html += `</div>`;
  const shown = STATE.noteFilter==='All' ? STATE.notes : STATE.notes.filter(n=>n.category===STATE.noteFilter);
  if(shown.length===0){ html += emptyHTML('notes','Nothing here yet','Jot packing items, local tips, or any reminder for the trip.'); }
  else {
    shown.forEach(n=>{
      const isPack = n.category==='Packing List';
      html += `<div class="card" style="display:flex;align-items:flex-start;gap:10px;">
        ${isPack
          ? `<button data-notetoggle="${n.id}" style="background:none;border:none;margin-top:1px;color:${n.done?'var(--terraceDeep)':'var(--bark)'};">${n.done?ICON.checksq:ICON.sq}</button>`
          : `<span style="margin-top:2px;flex-shrink:0;color:var(--gold);">${ICON.sparkle}</span>`}
        <div style="flex:1;">
          <div style="font-size:14px;${n.done?'text-decoration:line-through;opacity:.55;':''}">${esc(n.text)}</div>
          <div style="font-size:11px;color:var(--soilSoft);margin-top:2px;">${esc(n.category)}</div>
        </div>
        ${actionColHTML('notes', n.id)}
      </div>`;
    });
  }
  html += `<div style="margin-top:32px;padding-top:18px;border-top:1px solid var(--fog);text-align:center;">
    <button data-reset-all style="background:none;border:none;color:var(--clay);font-size:12px;font-weight:600;text-decoration:underline;padding:8px;">Clear all trip data &amp; start fresh</button>
    <div style="font-size:10.5px;color:var(--soilSoft);margin-top:2px;">Save a PDF first if you want to keep a copy — this removes everything from this device.</div>
  </div>`;
  return html;
}
function openNoteSheet(existing){
  draft = existing ? {...existing} : {category:'General', text:'', done:false};
  const canSave = ()=> !!(draft.text && draft.text.trim());
  const html = fieldHTML('Category', selectHTML('category', NOTE_CATS, draft.category))
    + fieldHTML('Note', textareaHTML('text', 'e.g. Bring small bills for the terrace viewpoint entrance fee', draft.text, 3));
  openSheet(existing?'Edit note':'Add note', html, ()=>{
    if(!draft.text || !draft.text.trim()) return;
    if(existing) STATE.notes = STATE.notes.map(x=> x.id===existing.id ? {...x, category: draft.category||'General', text: draft.text} : x);
    else STATE.notes.push({category: draft.category||'General', text: draft.text, done:false, id: uid()});
    persist('notes'); closeSheet(); renderAll();
  }, canSave, existing?'Save changes':'Save note');
}

/* ==================================================
   TAB: OVERVIEW
================================================== */
function renderOverview(){
  const events = [];
  STATE.flights.forEach(f=> { const d = f.departDate || f.date; d && events.push({id:f.id, type:'flight', date:d, title:`${f.from||'?'} → ${f.to||'?'}`, sub:[f.airline, (f.departTime||f.time)?`Dep ${f.departTime||f.time}`:null, (f.arriveDate && f.arriveDate!==d)?`Arr ${fmtShort(f.arriveDate)}${f.arriveTime?' '+f.arriveTime:''}`:(f.arriveTime?`Arr ${f.arriveTime}`:null)].filter(Boolean).join(' · ')}); });
  STATE.stays.forEach(s=> s.checkIn && events.push({id:s.id, type:'stay', date:s.checkIn, title:s.name, sub:`Check-in${s.checkOut?` → checkout ${fmtShort(s.checkOut)}`:''}${s.location?` · ${s.location}`:''}`}));
  STATE.tours.forEach(t=> { const d = t.startDate || t.date; d && events.push({id:t.id, type:'tour', date:d, title:t.name, sub:[t.provider, (t.endDate && t.endDate!==d)?`through ${fmtShort(t.endDate)}`:null, t.time].filter(Boolean).join(' · ')}); });
  events.sort((a,b)=> a.date.localeCompare(b.date));

  const today = new Date().toISOString().slice(0,10);
  const upcoming = events.filter(e=>e.date>=today);
  const next = upcoming[0];
  let daysUntil = null;
  if(next){ daysUntil = Math.max(0, Math.round((new Date(next.date)-new Date(today))/86400000)); }

  const auto = computeAutoTotals();
  const manual = STATE.budget.reduce((s,b)=>s+(Number(b.amount)||0),0);
  const grand = manual + auto.flights + auto.stays + auto.tours;

  const iconFor = {flight:'plane', stay:'building', tour:'map'};

  let heroLabel = events.length===0 ? 'Ready when you are' : (next ? 'Next up' : 'Trip complete');
  let heroMain = events.length===0 ? 'Start planning' : (next ? (daysUntil===0 ? "It's happening today" : `${daysUntil} day${daysUntil===1?'':'s'} to go`) : 'Enjoy the memories');

  let html = tabHeadHTML('grid','Overview','Your journey at a glance', null);

  html += `<div style="position:relative;border-radius:18px;overflow:hidden;margin-bottom:18px;background:linear-gradient(160deg,var(--terraceDeep),var(--soil));padding:20px;">
    <svg viewBox="0 0 400 100" preserveAspectRatio="none" style="position:absolute;bottom:0;left:0;width:100%;height:60px;opacity:.5;">
      <polygon points="0,100 0,70 40,70 40,55 90,55 90,40 150,40 150,60 210,60 210,45 270,45 270,65 330,65 330,50 400,50 400,100" fill="var(--gold)" opacity="0.35"/>
      <polygon points="0,100 0,85 60,85 60,72 120,72 120,80 190,80 190,68 260,68 260,82 340,82 340,70 400,70 400,100" fill="var(--terraceLight)" opacity="0.3"/>
    </svg>
    <div style="position:relative;display:flex;align-items:center;gap:14px;">
      <div>${logoSVG(64)}</div>
      <div>
        <div class="uc" style="font-size:11.5px;color:var(--goldSoft);font-weight:600;">${esc(heroLabel)}</div>
        <div class="serif" style="font-weight:800;font-size:22px;color:var(--mist);margin-top:2px;line-height:1.15;">${esc(heroMain)}</div>
        ${next?`<div style="font-size:12.5px;color:var(--terraceLight);margin-top:2px;">${esc(next.title)} · ${esc(fmtDate(next.date))}</div>`:''}
      </div>
    </div>
  </div>`;

  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
    <div class="card" style="margin:0;"><div class="uc" style="font-size:11px;color:var(--soilSoft);font-weight:600;">Total budget</div><div class="serif" style="font-weight:700;font-size:20px;margin-top:2px;">${peso(grand)}</div></div>
    <div class="card" style="margin:0;"><div class="uc" style="font-size:11px;color:var(--soilSoft);font-weight:600;">Itinerary items</div><div class="serif" style="font-weight:700;font-size:20px;margin-top:2px;">${events.length}</div></div>
  </div>`;

  const urgentDoc = urgentDocument();
  if(urgentDoc){
    html += `<div class="card" style="border-color:var(--clay);background:#FBEFE7;display:flex;align-items:center;gap:10px;">
      <span style="color:var(--clay);flex-shrink:0;">${ICON.alert}</span>
      <div style="font-size:12.5px;color:var(--soil);"><strong>${esc(urgentDoc.label)}</strong> ${urgentDoc.days<0?'has expired':`expires in ${urgentDoc.days} day${urgentDoc.days===1?'':'s'}`} (${esc(fmtDate(urgentDoc.expiryDate))})</div>
    </div>`;
  }

  const reminders = upcomingReminders(24);
  if(reminders.length){
    const r = reminders[0];
    const hrs = Math.round(r.hoursUntil);
    const whenText = hrs<1 ? 'less than an hour' : (hrs===1 ? '1 hour' : (hrs<24 ? `${hrs} hours` : `${Math.round(hrs/24)} day${Math.round(hrs/24)===1?'':'s'}`));
    html += `<div class="card" style="border-color:var(--gold);background:#FBF6E9;display:flex;align-items:center;gap:10px;">
      <span style="color:var(--gold);flex-shrink:0;">${ICON.bell}</span>
      <div style="font-size:12.5px;color:var(--soil);"><strong>${esc(r.label)}</strong> in about ${esc(whenText)} (${esc(fmtDate(r.date))}${r.time?' · '+esc(r.time):''})</div>
    </div>`;
  }

  html += `<div class="serif" style="font-weight:600;font-size:16px;margin-bottom:10px;">Trip sequence</div>`;

  if(events.length===0){
    html += emptyHTML('grid','Nothing scheduled yet',"Add flights, stays, or tour packages with dates — they'll line up here automatically.");
  } else {
    const grouped = [];
    events.forEach(e=>{
      let g = grouped.find(g=>g.date===e.date);
      if(!g){ g={date:e.date, items:[]}; grouped.push(g); }
      g.items.push(e);
    });
    html += `<div style="position:relative;padding-left:4px;">`;
    grouped.forEach((g,gi)=>{
      html += `<div style="display:flex;gap:12px;margin-bottom:4px;">
        <div style="display:flex;flex-direction:column;align-items:center;width:34px;">
          <div style="width:10px;height:10px;border-radius:50%;background:var(--gold);margin-top:6px;flex-shrink:0;"></div>
          ${gi<grouped.length-1?'<div style="width:2px;flex:1;background:var(--fog);margin-top:2px;"></div>':''}
        </div>
        <div style="flex:1;padding-bottom:18px;">
          <div class="mono" style="font-size:12px;color:var(--clay);font-weight:500;margin-bottom:6px;">${esc(fmtDate(g.date))}</div>
          ${g.items.map(e=>`
            <div class="card" style="margin-bottom:8px;display:flex;align-items:center;gap:10px;">
              <div style="width:34px;height:34px;border-radius:9px;background:var(--fog);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--terraceDeep);">${ICON[iconFor[e.type]]}</div>
              <div style="flex:1;min-width:0;">
                <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(e.title)}</div>
                ${e.sub?`<div style="font-size:12px;color:var(--soilSoft);">${esc(e.sub)}</div>`:''}
              </div>
            </div>`).join('')}
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `<button class="btn-primary" style="margin-top:16px;background:var(--clay);" data-open-sheet="savepdf">${ICON.download} Save trip as PDF</button>`;
  return html;
}

/* ---------------- MAIN RENDER ---------------- */
function renderAll(){
  if(!STATE.loaded){
    document.getElementById('content').innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;gap:12px;">${logoSVG(72)}<div style="font-size:13px;color:var(--soilSoft);">Loading your journey…</div></div>`;
    document.getElementById('bottomnav').innerHTML = '';
    return;
  }
  renderNav();
  let html = '';
  if(STATE.tab==='overview') html = renderOverview();
  else if(STATE.tab==='flights') html = renderFlights();
  else if(STATE.tab==='stays') html = renderStays();
  else if(STATE.tab==='tours') html = renderTours();
  else if(STATE.tab==='budget') html = renderBudget();
  else if(STATE.tab==='notes') html = renderNotes();
  document.getElementById('content').innerHTML = `<div class="tabpad">${html}</div>`;
  if(STATE.tab==='budget') recomputeCurrency();
}

function showConfirmDialog(title, message, confirmLabel, onConfirm){
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;padding:24px;';
  overlay.innerHTML = `
    <div class="confirm-bg" style="position:absolute;inset:0;background:rgba(51,38,28,.55);"></div>
    <div style="position:relative;background:var(--paper);border-radius:16px;padding:20px;max-width:360px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.35);">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <div style="width:32px;height:32px;flex-shrink:0;">${logoSVG(32)}</div>
        <div class="serif" style="font-weight:700;font-size:16px;color:var(--soil);">${esc(title)}</div>
      </div>
      <div style="font-size:13.5px;color:var(--soilSoft);line-height:1.55;margin-bottom:20px;white-space:pre-line;">${esc(message)}</div>
      <div style="display:flex;gap:10px;">
        <button class="confirm-cancel" style="flex:1;background:var(--fog);border:none;border-radius:10px;padding:11px;font-weight:600;font-size:13.5px;color:var(--soil);">Cancel</button>
        <button class="confirm-ok" style="flex:1;background:var(--clay);border:none;border-radius:10px;padding:11px;font-weight:600;font-size:13.5px;color:var(--mist);">${esc(confirmLabel)}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const cleanup = () => { if(overlay.parentNode) document.body.removeChild(overlay); };
  overlay.querySelector('.confirm-bg').onclick = cleanup;
  overlay.querySelector('.confirm-cancel').onclick = cleanup;
  overlay.querySelector('.confirm-ok').onclick = () => { cleanup(); onConfirm(); };
}

function resetAllData(){
  showConfirmDialog(
    'My Travel Organizer',
    'This permanently deletes all flights, stays, tours, budget entries, notes, documents, journal entries, emergency contacts, and saved trip PDFs from this device. This cannot be undone.',
    'Clear everything',
    () => {
      ['flights','stays','tours','budget','notes','contacts','savedTrips','documents','journal'].forEach(k=>{
        STATE[k] = [];
        persist(k);
      });
      STATE.noteFilter = 'All';
      STATE.tab = 'overview';
      renderAll();
    }
  );
}

/* ---------------- EVENT DELEGATION ---------------- */
document.addEventListener('click', (e)=>{
  const nav = e.target.closest('[data-nav]');
  if(nav){ STATE.tab = nav.getAttribute('data-nav'); renderAll(); return; }

  const openBtn = e.target.closest('[data-open-sheet]');
  if(openBtn){
    const k = openBtn.getAttribute('data-open-sheet');
    if(k==='flight') openFlightSheet();
    else if(k==='stay') openStaySheet();
    else if(k==='tour') openTourSheet();
    else if(k==='budget') openBudgetSheet();
    else if(k==='note') openNoteSheet();
    else if(k==='contact') openContactSheet();
    else if(k==='savepdf') openSavePdfSheet();
    else if(k==='document') openDocSheet();
    else if(k==='journal') openJournalSheet();
    return;
  }

  const refreshBtn = e.target.closest('[data-refresh-rates]');
  if(refreshBtn){ refreshRates(); return; }

  const resetBtn = e.target.closest('[data-reset-all]');
  if(resetBtn){ resetAllData(); return; }

  const enableNotifBtn = e.target.closest('[data-enable-notifs]');
  if(enableNotifBtn){
    if(typeof Notification!=='undefined'){
      Notification.requestPermission().then(()=>{ renderAll(); checkReminders(); });
    }
    return;
  }

  const dlBtn = e.target.closest('[data-download-trip]');
  if(dlBtn){
    const id = dlBtn.getAttribute('data-download-trip');
    const trip = STATE.savedTrips.find(t=>t.id===id);
    if(trip){
      const bytes = base64ToBytes(trip.pdfBase64);
      downloadPDFBytes(bytes, safeFileName(trip.name) + '.pdf');
    }
    return;
  }

  const editBtn = e.target.closest('[data-edit]');
  if(editBtn){
    const [list, id] = editBtn.getAttribute('data-edit').split(':');
    const item = STATE[list].find(x=>x.id===id);
    if(item){
      if(list==='flights') openFlightSheet(item);
      else if(list==='stays') openStaySheet(item);
      else if(list==='tours') openTourSheet(item);
      else if(list==='budget') openBudgetSheet(item);
      else if(list==='notes') openNoteSheet(item);
      else if(list==='contacts') openContactSheet(item);
      else if(list==='documents') openDocSheet(item);
      else if(list==='journal') openJournalSheet(item);
    }
    return;
  }

  const del = e.target.closest('[data-del]');
  if(del){
    const [list, id] = del.getAttribute('data-del').split(':');
    STATE[list] = STATE[list].filter(x=>x.id!==id);
    persist(list); renderAll();
    return;
  }

  const nf = e.target.closest('[data-notefilter]');
  if(nf){ STATE.noteFilter = nf.getAttribute('data-notefilter'); renderAll(); return; }

  const nt = e.target.closest('[data-notetoggle]');
  if(nt){
    const id = nt.getAttribute('data-notetoggle');
    STATE.notes = STATE.notes.map(n=> n.id===id ? {...n, done: !n.done} : n);
    persist('notes'); renderAll();
    return;
  }
});

updateOfflineBadge();
document.addEventListener('input', (e)=>{
  if(e.target.id==='curAmount' || e.target.id==='curFrom' || e.target.id==='curTo') recomputeCurrency();
});
document.addEventListener('change', (e)=>{
  if(e.target.id==='curFrom' || e.target.id==='curTo') recomputeCurrency();
});
loadAll();
refreshRates();
setInterval(checkReminders, 5*60*1000);
